<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#63E6BE" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mintfield" />
  <title>Mintfield</title>
  <link id="appleIcon" rel="apple-touch-icon" href="" />
  <link id="favIcon" rel="icon" href="" />
  <style>
    :root {
      --bg: #eafff7;
      --mint: #63E6BE;
      --mint-dark: #237d68;
      --card: rgba(252, 255, 254, .94);
      --line: #c9f1e3;
      --text: #203d36;
      --muted: #7e9991;
      --shadow: 0 12px 32px rgba(39, 125, 104, .12);
      --danger-soft: #FFE3EE;
      --danger-text: #E783A3;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { min-height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 10% 0%, #caffef 0, var(--bg) 34%, #f9fffd 100%);
      color: var(--text);
      padding: max(14px, env(safe-area-inset-top)) 14px max(88px, env(safe-area-inset-bottom));
    }
    .app { max-width: 760px; margin: 0 auto; }
    header { padding: 10px 4px 12px; }
    .eyebrow { color: var(--text); font-size: 18px; font-weight: 800; letter-spacing: .04em; }
    .header-date { color: var(--mint-dark); font-size: 13px; font-weight: 700; margin-top: 5px; }
    h1 { margin: 6px 0 0; font-size: 28px; line-height: 1.15; }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      padding: 16px;
      margin: 12px 0;
    }
    .topline { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .count { color: var(--muted); font-size: 13px; }
    .bar { height: 9px; background: #dff8ef; border-radius: 999px; overflow: hidden; margin-top: 12px; }
    .fill { height: 100%; width: 0%; background: var(--mint); transition: width .28s ease; }
    .empty { color: var(--muted); text-align: center; padding: 24px 10px; line-height: 1.7; font-size: 14px; }
    .calendar-empty-add {
      width: 54px; height: 54px; margin: 0 auto;
      border-radius: 20px; border: 1px solid var(--line);
      background: white; color: var(--mint-dark);
      font-size: 32px; font-weight: 800; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(47, 146, 120, .06);
    }

    .home-actions {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px;
    }
    .symbol-btn {
      height: 46px; border-radius: 18px; border: 1px solid var(--line);
      background: white; color: var(--mint-dark); font-size: 26px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 14px rgba(47, 146, 120, .05);
    }
    .symbol-btn.minus { color: var(--danger-text); background: #fff8fb; }

    .group { margin: 12px 0; }
    .group-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border: 1px solid var(--line); border-radius: 18px;
      background: rgba(255,255,255,.78); box-shadow: 0 5px 16px rgba(47, 146, 120, .05);
      user-select: none; cursor: pointer;
    }
    .group-title { font-weight: 750; font-size: 15px; }
    .group-right { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .chev { font-size: 15px; color: var(--mint-dark); }
    .group-body { margin-top: 8px; }
    .group.collapsed .group-body { display: none; }

    .task-shell { position: relative; margin: 9px 0; border-radius: 18px; overflow: hidden; }
    .task-shell.dragging { overflow: visible; z-index: 30; }
    .task-action {
      position: absolute; inset: 0 0 0 auto; width: 33%;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 18px; background: linear-gradient(90deg, transparent, #fff0f5);
      opacity: 0; pointer-events: none; transition: opacity .12s ease;
    }
    .task-shell.open .task-action,
    .task-shell.swiping .task-action { opacity: 1; pointer-events: auto; }
    .task-shell.dragging .task-action { opacity: 0 !important; pointer-events: none !important; }
    .xbtn {
      width: 34px; height: 34px; border-radius: 50%; border: none;
      background: var(--danger-soft); color: var(--danger-text);
      font-size: 16px; line-height: 1; padding: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 750;
    }
    .task {
      position: relative; z-index: 1;
      display: grid; grid-template-columns: 30px 1fr 28px; gap: 10px; align-items: start;
      min-height: 54px; padding: 11px 12px;
      border: 1px solid var(--line); border-radius: 18px;
      background: white; box-shadow: 0 4px 14px rgba(47, 146, 120, .06);
      transform: translateX(0); transition: transform .18s ease, opacity .18s ease, background .18s ease, box-shadow .18s ease;
      touch-action: pan-y;
    }
    .task-main { min-width: 0; }
    .drag-handle {
      align-self: stretch; min-height: 32px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 18px; font-weight: 800; line-height: 1;
      touch-action: none; cursor: grab; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none;
    }
    .drag-handle:active { background: #eefcf7; color: var(--mint-dark); cursor: grabbing; }
    .task.removing { opacity: 0; transform: translateX(-40%) scale(.98); }
    .task.sorting { box-shadow: 0 16px 34px rgba(35, 125, 104, .22); transform: scale(1.025); }
    body.drag-lock { overflow: hidden; -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; }
    .drop-before { border-top: 2px solid var(--mint-dark); padding-top: 7px; }
    .drop-after { border-bottom: 2px solid var(--mint-dark); padding-bottom: 7px; }
    .check {
      margin-top: 2px; width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--mint-dark);
      display: grid; place-items: center; color: white; font-size: 15px; font-weight: 700; flex: none;
    }
    .task.done { opacity: .58; background: #f7fbf9; }
    .task.done .check { background: var(--mint-dark); }
    .task.done .txt { text-decoration: line-through; color: var(--muted); }

    /* iPhone / mobile: avoid accidental text selection while swiping or long-press sorting. */
    .task,
    .task *,
    .task-shell,
    .task-shell *,
    .sticky-note,
    .sticky-note *,
    .sticky-shell,
    .sticky-shell *,
    .group-head,
    .day,
    .tab,
    button {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }
    input,
    textarea,
    select,
    .rename-input,
    [contenteditable="true"] {
      -webkit-user-select: text;
      user-select: text;
      -webkit-touch-callout: default;
    }
    body.drag-lock,
    body.drag-lock * {
      -webkit-user-select: none !important;
      user-select: none !important;
      -webkit-touch-callout: none !important;
      overscroll-behavior: none;
    }

    .txt { font-size: 15px; line-height: 1.35; word-break: break-word; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .rename-input { width: 100%; min-height: 34px; padding: 6px 8px; border-radius: 10px; font-size: 15px; line-height: 1.35; }
    .note { color: var(--muted); font-size: 13px; line-height: 1.45; margin-top: 5px; white-space: pre-wrap; }
    .meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 7px; }
    .tag { font-size: 11px; color: var(--mint-dark); background: #e8fbf4; padding: 3px 7px; border-radius: 999px; }
    .due { color: var(--muted); background: #f3faf7; }
    .soon { color: #9a6d2d; background: #fff3dd; }

    .days { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
    .day {
      border: 1px solid var(--line); background: white; border-radius: 16px; padding: 10px 6px;
      text-align: center; color: var(--text);
    }
    .day.active { background: var(--mint); border-color: var(--mint); color: #113a31; font-weight: 750; }
    .day .dow { font-size: 11px; color: inherit; opacity: .72; }
    .day .num { font-size: 18px; margin-top: 2px; }
    .day .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--mint-dark); margin: 5px auto 0; opacity: .8; }

    .form { display: grid; gap: 10px; }
    input, select, button, textarea {
      font-family: inherit; font-size: 15px; color: var(--text);
      border: 1px solid var(--line); border-radius: 16px; padding: 12px 13px;
      background: white; outline: none;
    }
    textarea { min-height: 80px; resize: vertical; }
    #taskNote { min-height: 68px; }
    input:focus, select:focus, textarea:focus { border-color: var(--mint-dark); box-shadow: 0 0 0 3px rgba(99, 230, 190, .22); }
    button.primary { border: none; background: var(--mint); color: #123b32; font-weight: 750; }
    button.secondary { background: #f1fff9; color: var(--mint-dark); font-weight: 700; }
    button.linkish { border: none; background: transparent; color: var(--mint-dark); text-align: left; padding: 4px 2px; font-weight: 700; }
    button:active { transform: scale(.985); }
    .quick-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .note-box { display: none; }
    .note-box.open { display: block; }


    .sticky-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px;
    }
    .sticky-add {
      min-height: 118px; height: 118px; border: 1px dashed var(--line); border-radius: 18px;
      background: rgba(255,255,255,.65); color: var(--mint-dark); font-size: 28px; font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .sticky-shell { position: relative; border-radius: 18px; overflow: hidden; min-height: 118px; }
    .sticky-action {
      position: absolute; inset: 0 0 0 auto; width: 33%;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 12px; background: linear-gradient(90deg, transparent, #fff0f5);
      opacity: 0; pointer-events: none; transition: opacity .12s ease;
    }
    .sticky-shell.open .sticky-action,
    .sticky-shell.swiping .sticky-action { opacity: 1; pointer-events: auto; }
    .sticky-note {
      position: relative; z-index: 1;
      min-height: 118px; height: 118px; width: 100%;
      border: 1px solid var(--line); border-radius: 18px;
      background: #dff8ef; color: var(--text); padding: 12px;
      box-shadow: 0 7px 18px rgba(47, 146, 120, .10);
      font-size: 14px; line-height: 1.45; text-align: left;
      white-space: pre-wrap; word-break: break-word;
      overflow: hidden; touch-action: pan-y;
      transition: transform .18s ease, opacity .18s ease, box-shadow .18s ease;
    }
    .sticky-note.empty-note {
      background: rgba(255,255,255,.75); border-color: var(--line);
      color: var(--muted); display: flex; align-items: center; justify-content: center; text-align: center;
    }
    .sticky-note.removing { opacity: 0; transform: translateX(-40%) scale(.98); }
    .sticky-input {
      width: 100%; height: 100%; min-height: 92px; border: none; border-radius: 12px;
      background: rgba(255,255,255,.55); color: var(--text); padding: 8px;
      font-size: 14px; line-height: 1.45; resize: none; box-shadow: none;
    }
    .sticky-hint { color: var(--muted); font-size: 13px; line-height: 1.55; margin-top: 10px; }

    .nav {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 20;
      padding: 9px 14px max(9px, env(safe-area-inset-bottom));
      background: rgba(250, 255, 253, .86); backdrop-filter: blur(18px); border-top: 1px solid var(--line);
      display: flex; justify-content: center;
    }
    .nav-inner { width: min(760px, 100%); display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .tab {
      border: 1px solid transparent; background: transparent; border-radius: 16px; padding: 9px 6px;
      color: var(--muted); font-size: 12px; font-weight: 700;
    }
    .tab.active { background: #e7fbf3; color: var(--mint-dark); border-color: var(--line); }
    .page { display: none; }
    .page.active { display: block; animation: rise .18s ease; }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 720px) {
      body { padding-top: 26px; }
      .days { grid-template-columns: repeat(10, 1fr); }
      .quick-row { grid-template-columns: 1fr 1fr 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div class="eyebrow" id="todayLine">Today’s</div>
      <h1>Mintfield</h1>
      <div class="header-date" id="todayDateLine"></div>
    </header>

    <section id="pageToday" class="page active">
      <div class="panel">
        <div class="topline">
          <strong>今天</strong>
          <span class="count" id="todayCount">0/0</span>
        </div>
        <div class="bar"><div class="fill" id="todayFill"></div></div>
        <div class="home-actions" aria-label="快捷操作">
          <button class="symbol-btn" type="button" onclick="showPage('Add')" aria-label="添加任务">+</button>
          <button class="symbol-btn minus" type="button" onclick="clearDone()" aria-label="清除已完成">−</button>
        </div>
      </div>
      <div id="todayList"></div>
    </section>

    <section id="pageCalendar" class="page">
      <div class="panel">
        <div class="topline">
          <strong>近 10 天</strong>
          <span class="count" id="selectedDateText"></span>
        </div>
        <div class="days" id="days"></div>
      </div>
      <div id="calendarList"></div>
    </section>


    <section id="pageNotes" class="page">
      <div class="panel">
        <div class="topline">
          <strong>便利贴</strong>
          <span class="count" id="notesCount">0/9</span>
        </div>
        <div class="sticky-grid" id="stickyGrid"></div>
      </div>
    </section>

    <section id="pageAdd" class="page">
      <div class="panel">
        <div class="topline"><strong>添加任务</strong><span class="count"></span></div>
        <div class="form" style="margin-top:12px;">
          <textarea id="taskText" placeholder="任务"></textarea>
          <button type="button" class="linkish" id="noteToggle">+ 说明</button>
          <div class="note-box" id="noteBox">
            <textarea id="taskNote" placeholder="说明"></textarea>
          </div>
          <select id="taskCategory">
            <option value="life">🌿 生活小样</option>
            <option value="study">🧩 学业拼图</option>
            <option value="repay">💰 还款进度</option>
            <option value="balance">⏰ 尾款提醒</option>
          </select>
          <select id="dateMode">
            <option value="today">今天</option>
            <option value="tomorrow">明天</option>
            <option value="ten">近10天内选一天</option>
            <option value="custom">指定日期</option>
          </select>
          <select id="tenDaySelect" style="display:none;"></select>
          <input id="customDate" type="date" style="display:none;" />
          <button class="primary" onclick="addTask()">添加</button>
          <div class="quick-row">
            <button class="secondary" onclick="quickAdd('喝一杯水','life')">喝水</button>
            <button class="secondary" onclick="quickAdd('吃一顿真正的饭','life')">吃饭</button>
            <button class="secondary" onclick="quickAdd('只看15分钟资料','study')">15分钟资料</button>
          </div>
        </div>
      </div>
    </section>
  </main>

  <nav class="nav">
    <div class="nav-inner">
      <button class="tab active" data-page="Today">今天</button>
      <button class="tab" data-page="Calendar">日历</button>
      <button class="tab" data-page="Notes">便利贴</button>
    </div>
  </nav>

  <script>
    const storageKey = "yuRecoveryBoardTasksV4";
    const collapsedKey = "yuRecoveryBoardCollapsedV1";
    const notesKey = "yuRecoveryBoardStickyNotesV1";
    const oldKeys = ["yuRecoveryBoardTasksV3", "yuRecoveryBoardTasksV2", "yuRecoveryBoardTasksV1"];
    const categoryMap = {
      survive: "life", room: "life", study: "study",
      life: "life", repay: "repay", balance: "balance"
    };
    const categories = ["life", "study", "repay", "balance"];
    const categoryLabel = {
      life: "🌿 生活小样", study: "🧩 学业拼图", repay: "💰 还款进度", balance: "⏰ 尾款提醒"
    };
    const MS = 86400000;
    let selectedDate = todayKey();
    let tasks = loadTasks();
    let notes = loadNotes();
    let collapsed = JSON.parse(localStorage.getItem(collapsedKey) || "{}");

    // Prevent iOS/Android browsers from selecting task text during swipe or sorting gestures.
    document.addEventListener("selectstart", e => {
      if (document.body.classList.contains("drag-lock") || e.target.closest(".task-shell")) {
        if (!e.target.closest("input, textarea, select, [contenteditable='true']")) e.preventDefault();
      }
    });
    document.addEventListener("contextmenu", e => {
      if (document.body.classList.contains("drag-lock") || e.target.closest(".task-shell")) {
        if (!e.target.closest("input, textarea, select, [contenteditable='true']")) e.preventDefault();
      }
    });
    document.addEventListener("touchmove", e => {
      if (document.body.classList.contains("drag-lock")) e.preventDefault();
    }, { passive: false });

    function iconData() {
      const svg = `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'>
        <rect width='180' height='180' rx='40' fill='#63E6BE'/>
        <path d='M90 119 C88 95 90 76 90 61' stroke='white' stroke-width='10' stroke-linecap='round' fill='none'/>
        <path d='M88 80 C59 78 42 61 39 38 C65 36 85 52 88 80Z' fill='white' opacity='.96'/>
        <path d='M93 91 C126 88 145 68 148 42 C119 41 96 62 93 91Z' fill='white' opacity='.96'/>
        <path d='M91 124 C72 119 58 106 53 89 C73 87 89 101 91 124Z' fill='white' opacity='.72'/>
        <circle cx='63' cy='55' r='7' fill='#63E6BE' opacity='.55'/>
      </svg>`;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }
    document.getElementById("appleIcon").href = iconData();
    document.getElementById("favIcon").href = iconData();

    function todayKey() { return toKey(new Date()); }
    function toKey(d) {
      const x = new Date(d.getFullYear(), d.getMonth(), d.getDate());
      return `${x.getFullYear()}-${String(x.getMonth()+1).padStart(2,'0')}-${String(x.getDate()).padStart(2,'0')}`;
    }
    function addDays(key, n) { const d = new Date(key + "T00:00:00"); d.setDate(d.getDate() + n); return toKey(d); }
    function parseKey(key) { return new Date(key + "T00:00:00"); }
    function dateText(key) {
      const d = parseKey(key);
      return d.toLocaleDateString("zh-CN", { month: "long", day: "numeric", weekday: "long" });
    }
    function shortDate(key) {
      const d = parseKey(key);
      return `${d.getMonth()+1}/${d.getDate()}`;
    }
    function formatSlashDate(key) {
      const d = parseKey(key);
      return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
    }
    function dayDiff(key) { return Math.round((parseKey(key) - parseKey(todayKey())) / MS); }
    function uid() { return "t" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

    function defaultTasks() {
      const t = todayKey();
      return [
        { id: uid(), text: "喝一杯水", note: "", category: "life", date: t, done: false, order: 1 },
        { id: uid(), text: "吃一顿真正的饭", note: "", category: "life", date: t, done: false, order: 2 },
        { id: uid(), text: "只看15分钟资料", note: "", category: "study", date: t, done: false, order: 3 },
        { id: uid(), text: "扔一袋垃圾", note: "", category: "life", date: addDays(t, 1), done: false, order: 4 },
        { id: uid(), text: "确认一项尾款日期", note: "", category: "balance", date: addDays(t, 3), done: false, order: 5 }
      ];
    }
    function normalizeTask(t, i=0) {
      const due = t.date || t.due || todayKey();
      return {
        id: t.id || uid(),
        text: String(t.text || "").trim(),
        note: String(t.note || "").trim(),
        category: categoryMap[t.category] || "life",
        date: /^\d{4}-\d{2}-\d{2}$/.test(due) ? due : todayKey(),
        done: !!t.done,
        order: Number.isFinite(t.order) ? t.order : (t.createdAt || Date.now() + i),
        createdAt: t.createdAt || Date.now() + i
      };
    }
    function loadTasks() {
      const current = localStorage.getItem(storageKey);
      if (current) return JSON.parse(current).map(normalizeTask).filter(t => t.text);
      for (const key of oldKeys) {
        const raw = localStorage.getItem(key);
        if (raw) {
          const migrated = JSON.parse(raw).map(normalizeTask).filter(t => t.text);
          localStorage.setItem(storageKey, JSON.stringify(migrated));
          return migrated;
        }
      }
      return defaultTasks();
    }

    function normalizeNote(n, i=0) {
      return {
        id: n.id || "n" + Date.now().toString(36) + Math.random().toString(36).slice(2,7),
        text: String(n.text || "").trim(),
        createdAt: n.createdAt || Date.now() + i
      };
    }
    function loadNotes() {
      const raw = localStorage.getItem(notesKey);
      if (!raw) return [];
      try {
        return JSON.parse(raw).map(normalizeNote).filter(n => n.text).slice(0, 9);
      } catch (_) {
        return [];
      }
    }

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(tasks));
      localStorage.setItem(notesKey, JSON.stringify(notes));
      localStorage.setItem(collapsedKey, JSON.stringify(collapsed));
    }

    function sorted(list) {
      return [...list].sort((a,b) => a.order - b.order || a.createdAt - b.createdAt);
    }
    function render() {
      document.getElementById("todayLine").textContent = "Today’s";
      document.getElementById("todayDateLine").textContent = formatSlashDate(todayKey());
      renderToday(); renderDays(); renderCalendar(); renderNotes(); fillDateSelect(); save();
    }
    function renderToday() {
      const list = tasks.filter(t => t.date === todayKey());
      const done = list.filter(t => t.done).length;
      document.getElementById("todayCount").textContent = `${done}/${list.length}`;
      document.getElementById("todayFill").style.width = list.length ? `${Math.round(done/list.length*100)}%` : "0%";
      drawGroupedList("todayList", list, "今天没有任务。", true, "today");
    }
    function renderDays() {
      const box = document.getElementById("days"); box.innerHTML = "";
      const names = ["日","一","二","三","四","五","六"];
      for (let i=0; i<10; i++) {
        const key = addDays(todayKey(), i);
        const d = parseKey(key);
        const has = tasks.some(t => t.date === key && !t.done);
        const el = document.createElement("button");
        el.className = "day" + (key === selectedDate ? " active" : "");
        el.innerHTML = `<div class="dow">${i===0 ? "今天" : "周" + names[d.getDay()]}</div><div class="num">${d.getDate()}</div>${has ? '<div class="dot"></div>' : ''}`;
        el.onclick = () => { selectedDate = key; render(); };
        box.appendChild(el);
      }
    }
    function renderCalendar() {
      document.getElementById("selectedDateText").textContent = "";
      const list = tasks.filter(t => t.date === selectedDate);
      if (!list.length && selectedDate !== todayKey()) {
        const box = document.getElementById("calendarList");
        box.innerHTML = `<div class="panel empty"><button class="calendar-empty-add" type="button" onclick="openAddForDate('${selectedDate}')" aria-label="添加这一天的任务">+</button></div>`;
        return;
      }
      drawGroupedList("calendarList", list, "这一天没有任务。", true, "calendar");
    }

    function openAddForDate(key) {
      fillDateSelect();
      const diff = dayDiff(key);
      const dateMode = document.getElementById("dateMode");
      const tenDaySelect = document.getElementById("tenDaySelect");
      const customDate = document.getElementById("customDate");
      if (diff >= 0 && diff < 10) {
        dateMode.value = "ten";
        tenDaySelect.value = key;
        tenDaySelect.style.display = "block";
        customDate.style.display = "none";
      } else {
        dateMode.value = "custom";
        customDate.value = key;
        tenDaySelect.style.display = "none";
        customDate.style.display = "block";
      }
      showPage("Add");
      setTimeout(() => document.getElementById("taskText").focus(), 80);
    }

    function drawGroupedList(id, list, emptyText, hideTodayDue, pageKey) {
      const box = document.getElementById(id); box.innerHTML = "";
      if (!list.length) { box.innerHTML = `<div class="panel empty">${emptyText}</div>`; return; }
      categories.forEach(cat => {
        const groupTasks = sorted(list.filter(t => t.category === cat));
        if (!groupTasks.length) return;
        const key = `${pageKey}:${cat}`;
        const group = document.createElement("section");
        group.className = "group" + (collapsed[key] ? " collapsed" : "");
        const done = groupTasks.filter(t => t.done).length;
        group.innerHTML = `<div class="group-head" role="button"><span class="group-title">${categoryLabel[cat]}</span><span class="group-right"><span>${done}/${groupTasks.length}</span><span class="chev">${collapsed[key] ? "⌄" : "⌃"}</span></span></div><div class="group-body" data-date="${groupTasks[0].date}" data-category="${cat}"></div>`;
        group.querySelector(".group-head").onclick = () => { collapsed[key] = !collapsed[key]; render(); };
        const body = group.querySelector(".group-body");
        groupTasks.forEach(task => body.appendChild(taskElement(task, hideTodayDue)));
        box.appendChild(group);
      });
    }
    function taskElement(task, hideTodayDue) {
      const index = tasks.findIndex(t => t.id === task.id);
      const shell = document.createElement("div"); shell.className = "task-shell"; shell.dataset.id = task.id;
      const action = document.createElement("div"); action.className = "task-action";
      const x = document.createElement("button"); x.className = "xbtn"; x.textContent = "✕"; x.setAttribute("aria-label", "删除");
      x.onclick = () => removeTask(index, shell);
      action.appendChild(x);
      const el = document.createElement("div"); el.className = "task" + (task.done ? " done" : "");
      const diff = dayDiff(task.date);
      const dueClass = diff >= 0 && diff <= 2 && !task.done ? " soon" : "";
      const due = hideTodayDue && task.date === todayKey() ? "" : `<span class="tag due${dueClass}">${shortDate(task.date)}</span>`;
      const note = task.note ? `<div class="note"></div>` : "";
      el.innerHTML = `<div class="check">${task.done ? "✓" : ""}</div><div class="task-main"><div class="txt"></div>${note}<div class="meta">${due}</div></div><div class="drag-handle" role="button" aria-label="拖动排序" title="拖动排序">·</div>`;
      const txtEl = el.querySelector(".txt");
      txtEl.textContent = task.text;
      if (task.note) el.querySelector(".note").textContent = task.note;
      el.querySelector(".check").onclick = () => toggleTask(index);
      addRenameGesture(txtEl, task);
      shell.appendChild(action);
      shell.appendChild(el);
      addSwipe(el, shell);
      addLongPressSort(shell, el, el.querySelector(".drag-handle"), task);
      return shell;
    }
    function addSwipe(el, shell) {
      let startX=0, startY=0, dx=0, open=false, dragging=false, moved=false;
      shell = shell || el.parentElement;
      const maxOpen = () => Math.min(shell.offsetWidth * .33, 120);
      el.addEventListener("touchstart", e => {
        if (el.classList.contains("sorting") || e.target.closest(".drag-handle")) return;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY; dx = 0; moved = false; dragging = true; el.style.transition = "none";
      }, {passive:true});
      el.addEventListener("touchmove", e => {
        if (!dragging || el.classList.contains("sorting")) return;
        const x = e.touches[0].clientX, y = e.touches[0].clientY;
        if (Math.abs(y-startY) > Math.abs(x-startX) + 8) return;
        dx = x - startX; if (Math.abs(dx) > 7) moved = true;
        let next = open ? -maxOpen() + dx : dx;
        next = Math.max(-maxOpen(), Math.min(0, next));
        shell.classList.toggle("swiping", next < -2);
        el.style.transform = `translateX(${next}px)`;
      }, {passive:true});
      el.addEventListener("touchend", () => {
        if (!dragging || el.classList.contains("sorting")) return;
        dragging = false; el.style.transition = "transform .18s ease";
        const threshold = maxOpen() * .45;
        open = open ? dx > threshold * .6 ? false : true : dx < -threshold;
        shell.classList.remove("swiping");
        shell.classList.toggle("open", open);
        el.style.transform = open ? `translateX(${-maxOpen()}px)` : "translateX(0)";
        if (moved) setTimeout(() => { dx = 0; }, 0);
      });
    }
    function addLongPressSort(shell, card, handle, task) {
      let sorting=false, startY=0, pointerId=null, lastTarget=null;
      const clearMarks = () => document.querySelectorAll(".drop-before,.drop-after").forEach(e => e.classList.remove("drop-before","drop-after"));
      const markTarget = (clientY) => {
        clearMarks(); lastTarget = null;
        const body = shell.parentElement;
        const siblings = [...body.querySelectorAll(".task-shell")].filter(el => el !== shell);
        if (!siblings.length) return;
        let target = null;
        for (const item of siblings) {
          const r = item.getBoundingClientRect();
          if (clientY >= r.top && clientY <= r.bottom) {
            target = { el: item, after: clientY > r.top + r.height / 2 };
            break;
          }
        }
        if (!target) {
          const first = siblings[0].getBoundingClientRect();
          const last = siblings[siblings.length - 1].getBoundingClientRect();
          if (clientY < first.top) target = { el: siblings[0], after: false };
          else if (clientY > last.bottom) target = { el: siblings[siblings.length - 1], after: true };
          else {
            let closest = siblings[0], min = Infinity;
            siblings.forEach(item => {
              const r = item.getBoundingClientRect();
              const dist = Math.abs(clientY - (r.top + r.height / 2));
              if (dist < min) { min = dist; closest = item; }
            });
            const r = closest.getBoundingClientRect();
            target = { el: closest, after: clientY > r.top + r.height / 2 };
          }
        }
        if (target) {
          target.el.classList.add(target.after ? "drop-after" : "drop-before");
          lastTarget = target;
        }
      };
      const startSort = (e) => {
        sorting = true;
        shell.classList.add("dragging");
        card.classList.add("sorting");
        document.body.classList.add("drag-lock");
        card.style.transition = "none";
        if (window.getSelection) window.getSelection().removeAllRanges();
        markTarget(e.clientY);
        if (navigator.vibrate) navigator.vibrate(12);
      };
      handle.addEventListener("pointerdown", e => {
        if (e.pointerType === "mouse" && e.button !== 0) return;
        e.preventDefault();
        e.stopPropagation();
        pointerId = e.pointerId;
        startY = e.clientY;
        try { handle.setPointerCapture(pointerId); } catch (_) {}
        startSort(e);
      });
      handle.addEventListener("pointermove", e => {
        if (pointerId !== null && e.pointerId !== pointerId) return;
        if (!sorting) return;
        e.preventDefault();
        e.stopPropagation();
        const moveY = e.clientY - startY;
        card.style.transform = `translateY(${moveY}px) scale(1.025)`;
        markTarget(e.clientY);
      });
      const end = (e) => {
        if (e && pointerId !== null && e.pointerId !== undefined && e.pointerId !== pointerId) return;
        if (pointerId !== null) { try { handle.releasePointerCapture(pointerId); } catch (_) {} }
        pointerId = null;
        if (!sorting) return;
        sorting = false;
        card.classList.remove("sorting"); shell.classList.remove("dragging");
        document.body.classList.remove("drag-lock");
        card.style.transition = "transform .18s ease";
        card.style.transform = "translateX(0)";
        if (window.getSelection) window.getSelection().removeAllRanges();
        if (lastTarget) {
          const parent = shell.parentElement;
          if (lastTarget.after) parent.insertBefore(shell, lastTarget.el.nextSibling);
          else parent.insertBefore(shell, lastTarget.el);
          saveOrderFromGroup(parent);
        }
        clearMarks(); lastTarget = null;
        setTimeout(render, 40);
      };
      handle.addEventListener("pointerup", end);
      handle.addEventListener("pointercancel", end);
      handle.addEventListener("lostpointercapture", end);
    }


    function renderNotes() {
      const grid = document.getElementById("stickyGrid");
      if (!grid) return;
      grid.innerHTML = "";
      document.getElementById("notesCount").textContent = `${notes.length}/9`;
      const visibleSlots = Math.max(1, notes.length);
      for (let i=0; i<visibleSlots; i++) {
        grid.appendChild(stickyElement(i, notes[i]));
      }
      if (notes.length < 9) {
        const add = document.createElement("button");
        add.type = "button";
        add.className = "sticky-add";
        add.textContent = "➕";
        add.setAttribute("aria-label", "添加便利贴");
        add.onclick = () => { startNoteEdit(notes.length, add); };
        grid.appendChild(add);
      }
    }

    function stickyElement(index, note) {
      const shell = document.createElement("div");
      shell.className = "sticky-shell" + (note ? "" : " empty-shell");
      const action = document.createElement("div");
      action.className = "sticky-action";
      const x = document.createElement("button");
      x.className = "xbtn";
      x.textContent = "✕";
      x.setAttribute("aria-label", "删除便利贴");
      x.onclick = e => { e.stopPropagation(); removeNote(index, shell); };
      action.appendChild(x);

      const card = document.createElement("button");
      card.type = "button";
      card.className = "sticky-note" + (note ? "" : " empty-note");
      card.textContent = note ? note.text : "写下一张便利贴……";
      card.onclick = () => {
        if (card.dataset.swiped === "1") return;
        startNoteEdit(index, card);
      };

      addStickySwipe(card, shell, index);
      shell.appendChild(action);
      shell.appendChild(card);
      return shell;
    }

    function startNoteEdit(index, card) {
      if (card.dataset.editing === "1") return;
      card.dataset.editing = "1";
      const current = notes[index]?.text || "";
      card.innerHTML = "";
      card.className = "sticky-note";
      card.classList.remove("empty-note");
      const input = document.createElement("textarea");
      input.className = "sticky-input";
      input.maxLength = 120;
      input.placeholder = "写下一张便利贴……";
      input.value = current;
      card.appendChild(input);

      const finish = () => {
        const value = input.value.trim();
        if (value) {
          if (notes[index]) notes[index].text = value;
          else notes[index] = { id: "n" + Date.now().toString(36) + Math.random().toString(36).slice(2,7), text: value, createdAt: Date.now() };
        } else if (notes[index]) {
          notes.splice(index, 1);
        }
        notes = notes.filter(Boolean).slice(0, 9);
        save(); renderNotes();
      };
      input.addEventListener("pointerdown", e => e.stopPropagation());
      input.addEventListener("click", e => e.stopPropagation());
      input.addEventListener("keydown", e => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") finish();
        if (e.key === "Escape") renderNotes();
      });
      input.addEventListener("blur", finish);
      input.focus();
      input.select();
    }

    function addStickySwipe(card, shell, index) {
      let startX=0, startY=0, dx=0, open=false, dragging=false, moved=false;
      const maxOpen = () => Math.min(shell.offsetWidth * .33, 96);
      card.addEventListener("touchstart", e => {
        if (!notes[index]) return;
        startX = e.touches[0].clientX; startY = e.touches[0].clientY; dx = 0; moved = false; dragging = true; card.style.transition = "none";
      }, {passive:true});
      card.addEventListener("touchmove", e => {
        if (!dragging || !notes[index]) return;
        const x = e.touches[0].clientX, y = e.touches[0].clientY;
        if (Math.abs(y-startY) > Math.abs(x-startX) + 8) return;
        dx = x - startX; if (Math.abs(dx) > 7) moved = true;
        let next = open ? -maxOpen() + dx : dx;
        next = Math.max(-maxOpen(), Math.min(0, next));
        shell.classList.toggle("swiping", next < -2);
        card.style.transform = `translateX(${next}px)`;
      }, {passive:true});
      card.addEventListener("touchend", () => {
        if (!dragging || !notes[index]) return;
        dragging = false; card.style.transition = "transform .18s ease";
        const threshold = maxOpen() * .45;
        open = open ? dx > threshold * .6 ? false : true : dx < -threshold;
        shell.classList.remove("swiping");
        shell.classList.toggle("open", open);
        card.style.transform = open ? `translateX(${-maxOpen()}px)` : "translateX(0)";
        if (moved) {
          card.dataset.swiped = "1";
          setTimeout(() => { dx = 0; delete card.dataset.swiped; }, 180);
        }
      });
    }

    function removeNote(index, shell) {
      if (!notes[index]) return;
      const card = shell.querySelector(".sticky-note");
      card.classList.add("removing");
      setTimeout(() => { notes.splice(index, 1); save(); renderNotes(); }, 160);
    }

    function addRenameGesture(txtEl, task) {
      let lastTap = 0, downX = 0, downY = 0;
      const begin = (e) => { e.preventDefault(); e.stopPropagation(); startRename(task, txtEl); };
      txtEl.addEventListener("dblclick", begin);
      txtEl.addEventListener("pointerdown", e => { downX = e.clientX; downY = e.clientY; });
      txtEl.addEventListener("pointerup", e => {
        if (Math.abs(e.clientX - downX) > 8 || Math.abs(e.clientY - downY) > 8) return;
        const now = Date.now();
        if (now - lastTap < 340) { lastTap = 0; begin(e); }
        else lastTap = now;
      });
    }

    function startRename(task, txtEl) {
      if (!txtEl || txtEl.dataset.editing === "1") return;
      txtEl.dataset.editing = "1";
      const input = document.createElement("input");
      input.className = "rename-input";
      input.value = task.text;
      input.setAttribute("aria-label", "重命名任务");
      const finish = (commit) => {
        const value = input.value.trim();
        if (commit && value) task.text = value;
        save(); render();
      };
      input.addEventListener("pointerdown", e => e.stopPropagation());
      input.addEventListener("click", e => e.stopPropagation());
      input.addEventListener("keydown", e => {
        if (e.key === "Enter") finish(true);
        if (e.key === "Escape") finish(false);
      });
      input.addEventListener("blur", () => finish(true));
      txtEl.replaceWith(input);
      input.focus(); input.select();
    }

    function saveOrderFromGroup(body) {
      const ids = [...body.querySelectorAll(".task-shell")].map(el => el.dataset.id);
      const base = Date.now();
      ids.forEach((id, i) => {
        const t = tasks.find(x => x.id === id);
        if (t) t.order = base + i;
      });
      save();
    }
    function toggleTask(index) { tasks[index].done = !tasks[index].done; render(); }
    function removeTask(index, shell) {
      const card = shell.querySelector(".task"); card.classList.add("removing");
      setTimeout(() => { tasks.splice(index,1); render(); }, 160);
    }
    function targetDate() {
      const mode = document.getElementById("dateMode").value;
      if (mode === "today") return todayKey();
      if (mode === "tomorrow") return addDays(todayKey(), 1);
      if (mode === "ten") return document.getElementById("tenDaySelect").value || todayKey();
      return document.getElementById("customDate").value || todayKey();
    }
    function addTask() {
      const input = document.getElementById("taskText");
      const noteInput = document.getElementById("taskNote");
      const text = input.value.trim(); if (!text) return;
      tasks.push({ id: uid(), text, note: noteInput.value.trim(), category: document.getElementById("taskCategory").value, date: targetDate(), done: false, order: Date.now(), createdAt: Date.now() });
      input.value = ""; noteInput.value = ""; closeNoteBox(); selectedDate = tasks[tasks.length-1].date; showPage("Today"); render();
    }
    function quickAdd(text, category) {
      tasks.push({ id: uid(), text, note: "", category, date: targetDate(), done: false, order: Date.now(), createdAt: Date.now() });
      selectedDate = tasks[tasks.length-1].date; showPage("Today"); render();
    }
    function clearDone() { tasks = tasks.filter(t => !t.done); render(); }
    function fillDateSelect() {
      const sel = document.getElementById("tenDaySelect");
      if (sel.dataset.ready === todayKey()) return;
      sel.innerHTML = "";
      for (let i=0; i<10; i++) {
        const key = addDays(todayKey(), i);
        const opt = document.createElement("option"); opt.value = key; opt.textContent = `${i===0 ? "今天" : shortDate(key)}｜${dateText(key)}`;
        sel.appendChild(opt);
      }
      sel.dataset.ready = todayKey();
    }
    document.getElementById("dateMode").addEventListener("change", e => {
      document.getElementById("tenDaySelect").style.display = e.target.value === "ten" ? "block" : "none";
      document.getElementById("customDate").style.display = e.target.value === "custom" ? "block" : "none";
    });
    function closeNoteBox() {
      document.getElementById("noteBox").classList.remove("open");
      document.getElementById("noteToggle").textContent = "+ 说明";
    }
    document.getElementById("noteToggle").onclick = () => {
      const box = document.getElementById("noteBox");
      box.classList.toggle("open");
      document.getElementById("noteToggle").textContent = box.classList.contains("open") ? "− 说明" : "+ 说明";
    };
    function showPage(name) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.getElementById("page" + name).classList.add("active");
      document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.page === name));
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    document.querySelectorAll(".tab").forEach(t => t.onclick = () => showPage(t.dataset.page));
    render();
  </script>
</body>
</html>
